name: Build

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [x64, ARM64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Install dependencies
        run: |
          echo "No external package manager dependencies."
          echo "libwebp is vendored in-repo; MSVC and Windows SDK come from the runner."

      - name: Build Release (${{ matrix.platform }})
        run: >
          msbuild vs2026\voidImageViewer.sln
          /p:Configuration=Release
          /p:Platform=${{ matrix.platform }}
          /p:PlatformToolset=v143
          /m
          /v:minimal

      - name: Upload voidImageViewer ${{ matrix.platform }} Release
        uses: actions/upload-artifact@v4
        with:
          name: voidImageViewer-${{ matrix.platform }}-Release
          path: vs2026/${{ matrix.platform }}/Release/*.exe
          if-no-files-found: error
