name: Build

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build voidImageViewer (Release x64)
        run: msbuild vs2019/voidImageViewer.sln /p:Configuration=Release /p:Platform=x64 /m /v:minimal

      - name: Verify executable
        shell: pwsh
        run: |
          $exe = "vs2019\x64\Release\voidImageViewer.exe"
          if (-not (Test-Path $exe)) {
            throw "Expected build output not found: $exe"
          }
          Write-Host "Built: $exe"
