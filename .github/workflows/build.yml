name: Build

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: x64
            executable: voidImageViewer.exe
          - platform: ARM64
            executable: voidImageViewerARM64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build Release
        run: >
          msbuild vs2019/voidImageViewer.sln
          /p:Configuration=Release
          /p:Platform=${{ matrix.platform }}
          /p:PlatformToolset=v143
          /p:WindowsTargetPlatformVersion=10.0
          /m
          /v:minimal

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: voidImageViewer-Release-${{ matrix.platform }}
          path: vs2019/${{ matrix.platform }}/Release/${{ matrix.executable }}
          if-no-files-found: error
