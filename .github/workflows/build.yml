name: Build

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [x64, Win32]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build Release
        run: >
          msbuild vs2019\voidImageViewer.sln
          /p:Configuration=Release
          /p:Platform=${{ matrix.platform }}
          /p:PlatformToolset=v143
          /m
          /v:minimal

      - name: Collect build outputs
        shell: pwsh
        run: |
          $dest = "${{ github.workspace }}\artifacts\${{ matrix.platform }}"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null

          if ("${{ matrix.platform }}" -eq "x64") {
            $src = "vs2019\x64\Release"
          } else {
            $src = "vs2019\Release"
          }

          Copy-Item "$src\voidImageViewer.exe" $dest
          if (Test-Path "$src\voidImageViewer.pdb") {
            Copy-Item "$src\voidImageViewer.pdb" $dest
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: voidImageViewer-${{ matrix.platform }}-Release
          path: artifacts/${{ matrix.platform }}/
          if-no-files-found: error
