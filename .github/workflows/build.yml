name: Build

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [Win32, x64, ARM, ARM64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Prepare project for CI
        shell: pwsh
        run: |
          # UnicoWS.lib is unavailable on modern Windows SDKs; strip it for Win32 CI builds.
          $proj = 'vs2019/voidImageViewer.vcxproj'
          (Get-Content $proj -Raw) `
            -replace 'UnicoWS\.lib;', '' `
            | Set-Content $proj

      - name: Build Release (${{ matrix.platform }})
        run: >
          msbuild vs2019\voidImageViewer.sln
          /p:Configuration=Release
          /p:Platform=${{ matrix.platform }}
          /p:PlatformToolset=v143
          /m
          /v:minimal

      - name: Collect build outputs
        shell: pwsh
        run: |
          $dest = "artifacts\${{ matrix.platform }}"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Get-ChildItem -Path vs2019 -Recurse -Filter *.exe |
            Where-Object { $_.DirectoryName -match '\\Release($|\\)' } |
            Copy-Item -Destination $dest -Force
          Get-ChildItem -Path $dest

      - name: Upload voidImageViewer (${{ matrix.platform }})
        uses: actions/upload-artifact@v4
        with:
          name: voidImageViewer-${{ matrix.platform }}-Release
          path: artifacts/${{ matrix.platform }}/
          if-no-files-found: error
