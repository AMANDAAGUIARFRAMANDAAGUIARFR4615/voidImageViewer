name: Build

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        platform: [x64, Win32]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build voidImageViewer (Release ${{ matrix.platform }})
        run: msbuild vs2019/voidImageViewer.sln /p:Configuration=Release /p:Platform=${{ matrix.platform }} /m /verbosity:minimal

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: voidImageViewer-${{ matrix.platform }}-Release
          path: vs2019/**/Release/voidImageViewer.exe
          if-no-files-found: error
