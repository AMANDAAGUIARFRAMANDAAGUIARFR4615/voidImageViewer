name: Build

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [x64, Win32, ARM64, ARM]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Verify vendored dependencies
        shell: pwsh
        run: |
          if (-not (Test-Path libwebp/src/dec/webp_dec.c)) {
            Write-Error "Vendored libwebp sources are missing."
          }
          Write-Host "libwebp is vendored in-repo; no external package install required."

      - name: Build Release (${{ matrix.platform }})
        shell: pwsh
        run: |
          msbuild vs2019\voidImageViewer.sln `
            /p:Configuration=Release `
            /p:Platform=${{ matrix.platform }} `
            /p:PlatformToolset=v143 `
            /p:ForceImportAfterCppTargets="$env:GITHUB_WORKSPACE\.github\build\ci.props" `
            /m `
            /v:minimal

      - name: Collect build output
        shell: pwsh
        run: |
          $platform = "${{ matrix.platform }}"
          $artifactDir = "artifacts\voidImageViewer-Release-$platform"
          New-Item -ItemType Directory -Force -Path $artifactDir | Out-Null

          $candidateDirs = @(
            "vs2019\$platform\Release",
            "vs2019\Release"
          )

          $exes = @()
          foreach ($dir in $candidateDirs) {
            if (Test-Path $dir) {
              $exes += Get-ChildItem -Path $dir -Filter *.exe -File -ErrorAction SilentlyContinue
            }
          }

          if ($exes.Count -eq 0) {
            Write-Error "No build output found for platform $platform."
          }

          $exes | ForEach-Object {
            Copy-Item -Path $_.FullName -Destination $artifactDir -Force
            Write-Host "Collected $($_.FullName)"
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: voidImageViewer-Release-${{ matrix.platform }}
          path: artifacts/voidImageViewer-Release-${{ matrix.platform }}/*
          if-no-files-found: error
